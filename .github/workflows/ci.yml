name: "Sample react ci pipeline"

on:
    push:
        branches:
            - main
            - master

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: "Set up nodejs"
              uses: actions/setup-node@v4
              with:
                node-version : '21'
            - name: "check node version"
              run: node --version
            - name: "clone the repository"
              uses: actions/checkout@v2
              

    